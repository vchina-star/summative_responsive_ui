<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Record — Student Finance Tracker</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header class="app-header">
    <h1>Student Finance Tracker</h1>
    <button id="menu-toggle" class="menu-toggle" aria-expanded="false" aria-controls="main-nav" aria-label="Toggle navigation">
      <span class="hamburger"></span>
    </button>
    <nav id="main-nav" class="main-nav" aria-label="Main navigation">
      <ul>
        <li><a href="../index.html" class="nav-link">About</a></li>
        <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
        <li><a href="records.html" class="nav-link">Records</a></li>
        <li><a href="add-edit.html" class="nav-link active">Add Record</a></li>
        <li><a href="settings.html" class="nav-link">Settings</a></li>
      </ul>
    </nav>
  </header>

  <div id="status-message" role="status" aria-live="polite" class="sr-only"></div>
  <div id="alert-message" role="alert" aria-live="assertive" class="sr-only"></div>

  <div class="page-wrapper">
    <nav class="sidebar-nav" aria-label="Main navigation">
      <ul>
        <li><a href="../index.html" class="nav-link">About</a></li>
        <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
        <li><a href="records.html" class="nav-link">Records</a></li>
        <li><a href="add-edit.html" class="nav-link active">Add Record</a></li>
        <li><a href="settings.html" class="nav-link">Settings</a></li>
      </ul>
    </nav>

    <main id="main-content">
    <section id="add-edit" aria-labelledby="add-edit-heading">
      <h2 id="add-edit-heading">Add Record</h2>

      <form id="transaction-form" novalidate>
        <div class="form-group">
          <label for="input-description">Description</label>
          <input type="text" id="input-description" name="description" required
                 placeholder="e.g. Lunch at cafeteria" autocomplete="off">
          <p id="error-description" class="field-error" aria-live="polite"></p>
        </div>

        <div class="form-group">
          <label for="input-amount">Amount</label>
          <input type="text" id="input-amount" name="amount" inputmode="decimal" required
                 placeholder="e.g. 12.50">
          <p id="error-amount" class="field-error" aria-live="polite"></p>
        </div>

        <div class="form-group">
          <label for="input-category">Category</label>
          <select id="input-category" name="category" required>
            <option value="">Select a category</option>
            <option value="Food">Food</option>
            <option value="Books">Books</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Fees">Fees</option>
            <option value="Other">Other</option>
          </select>
          <p id="error-category" class="field-error" aria-live="polite"></p>
        </div>

        <div class="form-group">
          <label for="input-date">Date</label>
          <input type="date" id="input-date" name="date" required>
          <p id="error-date" class="field-error" aria-live="polite"></p>
        </div>

        <input type="hidden" id="edit-id" name="editId" value="">

        <div class="form-actions">
          <button type="submit" id="form-submit-btn">Add Transaction</button>
          <button type="button" id="form-cancel-btn" hidden>Cancel Edit</button>
        </div>
      </form>
    </section>
    </main>
  </div>

  <script type="module" src="../scripts/ui.js"></script>
</body>
</html>
